# AUTHENTICATION / AUTHORIZATION BACKENDS
auth_backends.1 = http
auth_backends.2 = internal

# HTTP AUTH BACKEND CONFIG
auth_http.http_method = post

auth_http.user_path     = http://host.docker.internal:8080/api/messaging/auth/user
auth_http.vhost_path    = http://host.docker.internal:8080/api/messaging/auth/vhost
auth_http.resource_path = http://host.docker.internal:8080/api/messaging/auth/resource
auth_http.topic_path    = http://host.docker.internal:8080/api/messaging/auth/topic

# HTTP AUTH CACHE
auth_cache.enabled = true
auth_cache.cached_backend = http
# TTL em milissegundos
# Exemplo: 5000ms = 5 segundos
auth_cache.cache_ttl = 5000
# Tamanho máximo do cache
auth_cache.cache_size = 10000
# Desabilita o usuário guest remotamente (boa prática)
loopback_users.guest = false